---
# storage role — NFS mounts, idmapd, local scratch baseline.
# Depends on `base` role (nfs-common installed). Run order: base → storage.

# ── Mount points ──
# For NetApp volumes that are already mounted, this also asserts perms on
# the live mount (the file module follows into the mounted FS). Team
# volumes (/mnt/compchem, /mnt/humgen, /mnt/informatics) get
# root:'domain users' + 2770 so AD users in `domain users` have access;
# others (default) get root:root + 0755.
- name: NFS mount point directories exist (perms enforced on live mount)
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode:  "{{ item.mode  | default('0755') }}"
  loop: "{{ storage_nfs_mounts }}"
  loop_control:
    label: "{{ item.path }}"
  # Skip entries flagged manage_perms:false — those are managed by
  # another role (e.g. team-volumes for /mnt/<team>). Without this
  # guard the default root:root:0755 fallback overwrites their work.
  when: item.manage_perms | default(true)
  tags: [storage, nfs]

# Bare mount-point dirs (state-only) for entries that opted out of
# perm management above. We still need the dir to exist before
# ansible.posix.mount tries to mount onto it.
- name: NFS mount point directories exist (no perm management)
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
  loop: "{{ storage_nfs_mounts }}"
  loop_control:
    label: "{{ item.path }}"
  when: not (item.manage_perms | default(true))
  tags: [storage, nfs]

# ── NetApp NFSv4 mounts (manages fstab + active mount state in one shot) ──
- name: NetApp NFSv4 volumes mounted (and fstab updated)
  ansible.posix.mount:
    src: "{{ item.src }}"
    path: "{{ item.path }}"
    fstype: nfs
    opts: "{{ storage_nfs_opts }}"
    state: mounted
  loop: "{{ storage_nfs_mounts }}"
  loop_control:
    label: "{{ item.path }}"
  tags: [storage, nfs]

# ── NFSv4 ID mapping ──
- name: idmapd Domain matches AD realm
  ansible.builtin.lineinfile:
    path: /etc/idmapd.conf
    regexp: '^#?\s*Domain\s*='
    line: "Domain = {{ storage_idmapd_domain }}"
    insertafter: '^\[General\]'
    backup: yes
  notify: clear nfsidmap cache
  tags: [storage, idmapd]

# ── Local /scratch baseline ─────────────────────────────────────────
# /scratch is the per-node local NVMe stripe (RAID-0 set up by the
# `raid` role; the FS itself is XFS). We enforce 0755 at the mount root
# to match /home's permission model. Per-user subdirs (/scratch/$USER)
# are created automatically on demand:
#   - On interactive login → PAM session hook in base role
#     (/usr/local/sbin/ensure-scratch-dir, called via pam_exec)
#   - On job allocation    → Slurm prolog (20-enroot-scratch.sh)
# Both paths set /scratch/$USER to 0700 owned by the user — identical
# privacy/ownership semantics as /home/$USER.
- name: Local /scratch root has 0755 (matches /home model)
  ansible.builtin.file:
    path: /scratch
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [storage, scratch]

# /scratch/cluster-software was the pre-NetApp bootstrap area for enroot
# cache + container catalog. Replaced by /software/containers/ (NetApp,
# managed elsewhere) and per-user /scratch/$USER/enroot/ (Slurm prolog
# territory). Dropped from this role since nothing references it.
# Leftover dirs on individual nodes can be cleaned up manually:
#   sudo rm -rf /scratch/cluster-software

# ── /software/* shared workspace posture ────────────────────────────
# Codifies the runtime perm fix applied 2026-06-09: every workspace dir
# under /software/ gets group=domain users + setgid (so new files inherit
# the group), and existing files get their group reset + g+rw so AD users
# can write within shared workspaces (oligoai, cluster-build, containers).
#
# /software/spack and /software/enroot-cache are handled separately:
#   - spack: admin-only writes — chgrp here, mode unchanged
#   - enroot-cache: pyxis-enroot role owns it (stricter 3770 posture)
#
# Cluster-controller-only because /software is NetApp-shared — every node
# sees the same FS, so we only need to run on cpu01.
- name: Software workspaces — top-level dir (group=domain users, setgid 2775)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    group: "domain users"
    mode: "2775"
  loop: "{{ storage_software_workspaces }}"
  when: inventory_hostname == slurm_controller
  tags: [storage, software-perms]

# All recursion done via find — only touches entries that drift, much
# faster than `file: recurse: yes` on large trees (e.g. spack: 95k files).
- name: Software workspaces — chgrp drift to 'domain users' (recursive via find)
  ansible.builtin.command:
    cmd: "find {{ item }} ! -group 'domain users' -print -exec chgrp 'domain users' {} +"
  register: _sw_chgrp
  changed_when: _sw_chgrp.stdout != ""
  loop: "{{ storage_software_workspaces }}"
  when: inventory_hostname == slurm_controller
  tags: [storage, software-perms]

- name: Software workspaces — dirs get setgid 2775 (recursive via find)
  ansible.builtin.command:
    cmd: "find {{ item }} -type d ! -perm -2775 -print -exec chmod 2775 {} +"
  register: _sw_dir_chmod
  changed_when: _sw_dir_chmod.stdout != ""
  loop: "{{ storage_software_workspaces }}"
  when: inventory_hostname == slurm_controller
  tags: [storage, software-perms]

- name: Software workspaces — files get g+rw (recursive via find)
  ansible.builtin.command:
    cmd: "find {{ item }} -type f ! -perm -060 -print -exec chmod g+rw {} +"
  register: _sw_file_chmod
  changed_when: _sw_file_chmod.stdout != ""
  loop: "{{ storage_software_workspaces }}"
  when: inventory_hostname == slurm_controller
  tags: [storage, software-perms]

# ── /software/spack — admin-only writes; only change group ──────────
# Mode stays 0775 (root rwx, group rx, other rx). AD users in
# 'domain users' read the Spack tree via the group bit (and via other
# rx). All writes go through `sudo` per project-memory.
- name: Software admin dirs (spack) — top-level group + mode
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    group: "domain users"
    mode: "0775"
  loop: "{{ storage_software_admin_dirs }}"
  when: inventory_hostname == slurm_controller
  tags: [storage, software-perms]

- name: Software admin dirs — chgrp drift to 'domain users' (recursive via find)
  ansible.builtin.command:
    cmd: "find {{ item }} ! -group 'domain users' -print -exec chgrp 'domain users' {} +"
  register: _sw_admin_chgrp
  changed_when: _sw_admin_chgrp.stdout != ""
  loop: "{{ storage_software_admin_dirs }}"
  when: inventory_hostname == slurm_controller
  tags: [storage, software-perms]
