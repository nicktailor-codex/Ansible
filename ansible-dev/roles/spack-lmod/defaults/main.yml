---
# spack-lmod role — Lmod module system (apt, per-node) + Spack package
# manager (NetApp-shared at /software/spack).
#
# Use case: side-by-side minor versions of user-facing tools (plink 1.9
# vs 2.0, python 3.10 vs 3.11, etc.) without rebuilding host packages.
# Containers stay the primary path for heavy workloads (REGENIE, PyTorch);
# this is the lightweight complement.
#
# Bumping Spack: change spack_version, re-run. Existing installs persist
# under /software/spack/opt/spack — the version bump only affects future
# `spack install` invocations.

spack_root: /software/spack
spack_repo: https://github.com/spack/spack.git
spack_version: v0.23.1            # last 0.x release; v1.x split builtin repo

# Where Spack writes the Lmod module tree. Lives under spack_root so
# every node sees the same module catalogue via NFS.
spack_modules_root: "{{ spack_root }}/share/spack/lmod"

# Apt packages for per-node Lmod install
spack_lmod_packages:
  - lmod                          # provides `module` command

# Apt packages needed on cpu01 for Spack to build things (compilers,
# fetchers, basic toolchain). Spack pulls more on demand; this is the
# bootstrap set.
spack_build_packages:
  - git
  - build-essential
  - gfortran
  - python3
  - python3-dev
  - python3-venv
  - patch
  - bzip2
  - xz-utils
  - file
  - gnupg2
  - unzip
  - tmux                          # for the spack-build-burden helper
