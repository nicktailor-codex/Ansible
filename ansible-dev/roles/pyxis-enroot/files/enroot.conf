ENROOT_CACHE_PATH       /software/enroot-cache
ENROOT_DATA_PATH        /scratch/$USER/enroot/data
ENROOT_RUNTIME_PATH     /scratch/$USER/enroot/runtime
ENROOT_TEMP_PATH        /scratch/$USER/enroot/tmp
ENROOT_CONNECT_TIMEOUT  30
ENROOT_TRANSFER_RETRIES 3
# Uncompressed squashfs — eliminates the LZO build step that OOM-killed
# container jobs under ~8 GB. Tradeoff: per-user squashfs files are ~3x
# larger (~2.3 GB for burdentesting vs 700 MB compressed) but build is
# faster, runtime I/O is faster, and the 8 GB memory floor drops to ~2 GB.
# /scratch is 7 TB/node — disk is not the constraint.
ENROOT_SQUASH_OPTIONS   -noI -noD -noF -noX -no-fragments
ENROOT_RESTRICT_DEV     yes
