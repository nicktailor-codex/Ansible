---
# pyxis-enroot validate.
# Read-only assertions; safe in --check mode.
# Confirms the container runtime stack is installed and matches expected.

- name: enroot binary reports expected version
  ansible.builtin.command:
    cmd: enroot version
  register: enroot_ver
  changed_when: false
  check_mode: false
  failed_when: enroot_ver.stdout != pyxis_enroot_version

- name: Pyxis SPANK plugin file present
  ansible.builtin.stat:
    path: "{{ pyxis_spank_so }}"
  register: pyxis_so_stat
  failed_when: not pyxis_so_stat.stat.exists

- name: enroot apt packages installed
  ansible.builtin.command:
    cmd: dpkg -s {{ item }}
  loop: "{{ pyxis_enroot_packages }}"
  register: enroot_pkg_check
  changed_when: false
  check_mode: false
  failed_when: enroot_pkg_check.rc != 0
  loop_control:
    label: "{{ item }}"
