---
# pyxis-enroot role defaults — v1 (codify current install).
# Install path (NVIDIA apt repo, enroot pkg, pyxis plugin pkg) lives in
# run-dir/PyxisEnroot-Setup.md; fold into tasks/install.yml later.

# Expected version — validate.yml asserts the runtime matches.
pyxis_enroot_version: "3.5.0"

# Pyxis SPANK plugin shared object. Loaded by slurmd via plugstack.conf
# (managed by the slurm role).
pyxis_spank_so: /usr/lib/x86_64-linux-gnu/slurm-wlm/spank_pyxis.so

# Canonical enroot config path
pyxis_enroot_conf: /etc/enroot/enroot.conf

# Shared image cache on NetApp. enroot.conf points ENROOT_CACHE_PATH
# here so all 4 nodes hit the same `.sqsh` files instead of pulling
# their own copy per node per user (which was ~6.9GB redundant for the
# burdentesting image alone).
#
# Perm posture (updated 2026-06-09):
#   mode  3770  = sticky + setgid + group rwx + no other access
#   group "domain users"  = every AD user can populate/use the cache
#   sticky → users can only delete their own files
#   setgid → new files inherit group "domain users" automatically
# Earlier model was 1777 (world-writable like /tmp) which broke once
# multiple AD users were importing — file group ended up as the importer's
# primary group ("domain users" only sometimes), and mode 0640 made layers
# unreadable by other users. Setgid + explicit group cures both.
pyxis_enroot_cache_dir: /software/enroot-cache
pyxis_enroot_cache_mode: "3770"
pyxis_enroot_cache_group: "domain users"

# Required Debian packages — same set on every node today.
pyxis_enroot_packages:
  - enroot
  - enroot+caps
