---
# base role defaults — override in group_vars or host_vars if needed

# /etc/hosts entries for the 4-node cluster (short + FQDN per line)
base_cluster_hosts:
  - { ip: "10.174.16.55", short: "insiiukcpu01",  fqdn: "insiiukcpu01.insmed.local" }
  - { ip: "10.174.16.56", short: "insiiukcgpu01", fqdn: "insiiukcgpu01.insmed.local" }
  - { ip: "10.174.16.57", short: "insiiukgpu01",  fqdn: "insiiukgpu01.insmed.local" }
  - { ip: "10.174.16.58", short: "insiiukgpu02",  fqdn: "insiiukgpu02.insmed.local" }

# Packages required on every cluster node
base_packages_present:
  - nfs-common         # NFSv4 client
  - acl                # POSIX ACL tools (setfacl/getfacl)
  - nfs4-acl-tools     # NFSv4 ACL tools (nfs4_setfacl/nfs4_getfacl)
  - exim4              # MTA (local-only until smarthost configured)
  - bsd-mailx          # /usr/bin/mail — needed by Slurm MailProg wrapper

# Packages we explicitly DON'T want (leftovers, redundant clients)
base_packages_absent:
  - mailutils          # alternative MUA — exim4 + bsd-mailx is what we standardised on

# kernel.unprivileged_userns_clone = 1 — required for enroot / unprivileged
# user namespaces. Default on Ubuntu 24.04, but make it explicit.
base_userns_clone: 1

# HPC sysctl tunables — applied via /etc/sysctl.d/95-hpc.conf.
# Defaults are tuned for general-purpose workstations; HPC needs much
# larger network buffers (NetApp NFS over 25 GbE) and minimal swap
# pressure. Values cribbed from NVIDIA NGC + RHEL HPC tuned profile.
base_hpc_sysctls:
  # Bump TCP buffer ceilings from default ~200KB → 128 MB. Required for
  # NetApp NFS with nconnect=16 to actually fill the wire.
  - { name: net.core.rmem_max,            value: "134217728" }
  - { name: net.core.wmem_max,            value: "134217728" }
  - { name: net.core.netdev_max_backlog,  value: "30000" }
  - { name: net.ipv4.tcp_rmem,            value: "4096 87380 134217728" }
  - { name: net.ipv4.tcp_wmem,            value: "4096 65536 134217728" }
  # Don't swap unless OOM-imminent. HPC jobs requesting --mem should
  # have their RSS resident; paging-out an in-flight stride kills perf.
  - { name: vm.swappiness,                value: "1" }
