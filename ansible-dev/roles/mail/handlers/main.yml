---
# update-exim4.conf rebuilds /var/lib/exim4/config.autogenerated from
# the split-config selector + any /etc/exim4/conf.d/ overrides. It also
# reloads the running exim4 daemon, so no separate restart is needed
# for config-only changes.
- name: update exim4 conf
  ansible.builtin.command:
    cmd: update-exim4.conf
