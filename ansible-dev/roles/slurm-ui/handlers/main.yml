---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: yes

- name: restart slurmrestd
  ansible.builtin.systemd:
    name: slurmrestd
    state: restarted

- name: restart slurm-web-agent
  ansible.builtin.systemd:
    name: slurm-web-agent
    state: restarted

- name: restart slurm-web-gateway
  ansible.builtin.systemd:
    name: slurm-web-gateway
    state: restarted

- name: restart sacctweb
  ansible.builtin.systemd:
    name: sacctweb
    state: restarted

- name: restart submitweb
  ansible.builtin.systemd:
    name: submitweb
    state: restarted

- name: restart apache2
  ansible.builtin.systemd:
    name: apache2
    state: restarted

- name: reload apache2
  ansible.builtin.systemd:
    name: apache2
    state: reloaded
