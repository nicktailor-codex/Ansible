---
# slurm-ui role v2 — slurm-web via rackslab's official Ubuntu 24.04
# apt repo. Packages are version-pinned by repo component:
#   slurmweb-3, slurmweb-4, slurmweb-5, slurmweb-6
#
# We're on Slurm 23.11 (Ubuntu's package). slurm-web v5 and v6 both
# expect Slurm's slurmrestd 0.0.41+ schema (Slurm 24.x). v4 talks to
# 0.0.39 cleanly — pin to slurmweb-4. /jobs, /nodes, /partitions,
# /qos, /accounts, /reservations all work; /stats 500s due to a
# schema lookup that doesn't apply to 23.11. Bump the component
# (and drop the version= override in agent.ini.j2) when Slurm goes
# to 24.05+.

slurm_ui_rackslab_keyring: /usr/share/keyrings/rackslab-archive-keyring.gpg
slurm_ui_rackslab_key_url: https://pkgs.rackslab.io/keyring.asc
slurm_ui_rackslab_repo_url: https://pkgs.rackslab.io/deb
slurm_ui_rackslab_release: ubuntu24.04
slurm_ui_rackslab_components: "main slurmweb-4"

# Controller-only system packages
slurm_ui_packages:
  - slurmrestd            # Slurm REST API daemon (Ubuntu repo)
  - slurm-web-agent       # rackslab — backend
  - slurm-web-gateway     # rackslab — UI + reverse proxy

# slurm-web listen addresses
slurm_ui_agent_port: 5012
slurm_ui_gateway_port: 5011
slurm_ui_gateway_interface: 0.0.0.0     # cluster-network accessible

# slurmrestd Unix socket (slurmrestd.service creates the runtime dir)
slurm_ui_slurmrestd_socket: /run/slurmrestd/slurmrestd.socket
