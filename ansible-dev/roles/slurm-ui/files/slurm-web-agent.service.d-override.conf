# Override the .deb's default User=slurm-web because slurmrestd's local
# auth (Unix socket peercred) requires the connecting process to share
# the slurm user's UID. Running the agent as slurm gets us through.
# Switch to auth=jwt and revert this override when Slurm gets bumped.
[Service]
User=slurm
Group=slurm
