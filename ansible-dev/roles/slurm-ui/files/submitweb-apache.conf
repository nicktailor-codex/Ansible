# submitweb-apache.conf — vhost config for the submitweb portal.
#
# Two vhosts:
#   :80   redirect-only → HTTPS so old http://… bookmarks still work
#   :443  the real site — TLS 1.2/1.3, strong ciphers, HSTS, AD-PAM auth,
#         reverse-proxy to the Flask backend on 127.0.0.1:5014
#
# Cert + key are generated by the slurm-ui role into /etc/ssl/ on first run
# (5-year self-signed; replace with an Insmed-issued cert later by overwriting
# the same files and reloading apache2).

<VirtualHost *:80>
    ServerName submit.cluster.local
    ServerAlias 10.174.16.55 insiiukcpu01 insiiukcpu01.insmed.local

    ErrorLog ${APACHE_LOG_DIR}/submitweb-error.log
    CustomLog ${APACHE_LOG_DIR}/submitweb-access.log combined

    # Any request — bounce to HTTPS, preserve path + query
    RewriteEngine On
    RewriteRule ^/?(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName submit.cluster.local
    ServerAlias 10.174.16.55 insiiukcpu01 insiiukcpu01.insmed.local

    ErrorLog ${APACHE_LOG_DIR}/submitweb-error.log
    CustomLog ${APACHE_LOG_DIR}/submitweb-access.log combined

    # ── TLS ──────────────────────────────────────────────────────────
    SSLEngine on
    SSLCertificateFile      /etc/ssl/certs/submitweb.crt
    SSLCertificateKeyFile   /etc/ssl/private/submitweb.key

    # Mozilla "intermediate" — TLS 1.2 + 1.3 only, strong ECDHE-AEAD ciphers.
    # No SSLv3, no TLS 1.0/1.1, no RC4, no 3DES, no DES, no MD5, no NULL.
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305
    SSLHonorCipherOrder     off
    SSLSessionTickets       off
    SSLCompression          off

    # HSTS — browsers that visit once will refuse plain HTTP for 2 years
    Header always set Strict-Transport-Security "max-age=63072000"

    # Belt-and-braces hardening headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"

    # ── Top-level redirect to the auth-gated path ────────────────────
    RedirectMatch ^/$ /submit/

    <Location /submit/>
        AuthType Basic
        AuthName "Insmed HPC cluster — AD login"
        AuthBasicProvider PAM
        AuthPAMService submitweb
        Require valid-user

        # Pass the authenticated user to the Flask backend
        RequestHeader set X-Remote-User "expr=%{REMOTE_USER}"

        ProxyPass        http://127.0.0.1:5014/
        ProxyPassReverse http://127.0.0.1:5014/
    </Location>
</VirtualHost>
