# Dev RBAC policy — auth is disabled in gateway.ini so every request
# comes in as 'anonymous'. Grant the anonymous role full read access
# (no mutation endpoints exist in slurm-web today anyway).
# Lock this down (and enable LDAP/JWT auth) when this becomes
# user-facing — see TODO under `slurm-ui`.

[roles]
anonymous

[anonymous]
actions=view-stats,view-jobs,view-nodes,view-partitions,view-qos,view-accounts,view-reservations
