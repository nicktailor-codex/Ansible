[Service]
# Auto-recover slurmctld if it crashes (e.g. the assoc_mgr deadlock bug in
# Slurm 23.11.x — fixed upstream in 23.11.6+ and 24.05+; we're on 23.11.4
# until the cluster-wide Slurm upgrade lands).
#
# slurmctld checkpoints state to disk every ~30s, so a restart recovers
# all in-flight jobs cleanly. Running jobs are unaffected during the
# outage (slurmd on each compute node manages them independently).
#
# StartLimitBurst + IntervalSec: allow up to 10 restarts in 5 min before
# giving up, so a flapping daemon doesn't restart-loop forever. A real
# persistent fault eventually surfaces as a hard failure for ops.
Restart=on-failure
RestartSec=5s
StartLimitBurst=10
StartLimitIntervalSec=300s
