# /etc/slurm/slurm.conf
# Research cluster — centralized SLURM controller on insiiukcpu01.
# Canonical config; identical on all 4 nodes.
# Per-node partitions: users target a specific node via partition.

# === Cluster identity ===
ClusterName=research-cluster
SlurmctldHost=insiiukcpu01

# === Authentication ===
AuthType=auth/munge
CryptoType=crypto/munge

# === User and paths ===
SlurmUser=slurm
SlurmdUser=root
SlurmctldPidFile=/var/run/slurmctld.pid
SlurmdPidFile=/var/run/slurmd.pid
SlurmdSpoolDir=/var/spool/slurmd
StateSaveLocation=/var/spool/slurmctld

# === Temp filesystem (used for TmpDisk accounting) ===
TmpFS=/scratch

# === Logging ===
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
SlurmctldDebug=info
SlurmdDebug=info

# === Timers ===
SlurmctldTimeout=300
SlurmdTimeout=300
InactiveLimit=0
MinJobAge=300
KillWait=30
Waittime=0

# === Scheduling ===
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_CPU_Memory
# Reject jobs at submit time when --time exceeds either the partition's
# MaxTime or the QoS's MaxWall. Without this, jobs are accepted with
# whatever --time the user requested, then killed mid-run at the cap —
# very confusing UX. ALL = enforce both partition and QoS limits.
EnforcePartLimits=ALL

# === Resource enforcement (cgroup v2) ===
ProctrackType=proctrack/cgroup
TaskPlugin=task/affinity,task/cgroup
PrologFlags=Alloc,Contain
JobAcctGatherType=jobacct_gather/cgroup
JobAcctGatherFrequency=30

# === Prolog / epilog (single dispatcher each; the .sh wrappers iterate
# /etc/slurm/prolog.d/ and /etc/slurm/epilog.d/ in lex order). Slurm
# 23.11's Prolog= directive expects a single executable file, NOT a
# directory — the wrapper pattern works around that.
Prolog=/etc/slurm/prolog.sh
Epilog=/etc/slurm/epilog.sh

# === Job notification mail ===
# Slurm calls MailProg with `-s "subject" recipient` and pipes the
# message body in stdin — that's the bsd-mailx interface. The mail
# role installs bsd-mailx at /usr/bin/mail, which routes via
# /usr/sbin/sendmail (exim4) → smarthost at EOP. Users opt in per job:
#   sbatch --mail-user=<addr> --mail-type=BEGIN,END,FAIL
# Unqualified --mail-user values get @insmed.com appended automatically.
MailProg=/etc/slurm/slurm-mail.sh
MailDomain=insmed.com

# === GPU resources ===
GresTypes=gpu

# === Job completion and accounting ===
JobCompType=jobcomp/none
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=insiiukcpu01
AccountingStorageEnforce=associations,limits,qos
AccountingStoreFlags=job_comment,job_script
# Track GPU GRES as TRES so `--gres=gpu:N` becomes a real scheduling
# constraint (otherwise Slurm silently drops the request). Typed variants
# (h200_nvl, l4) are tracked separately so accounting + sinfo reports
# show the GPU class actually allocated. Change requires slurmctld
# restart (not just `scontrol reconfigure`).
AccountingStorageTRES=gres/gpu,gres/gpu:h200_nvl,gres/gpu:l4

# === MPI / topology ===
MpiDefault=none
TopologyPlugin=topology/none

# === Return-to-service after node failure ===
ReturnToService=2

# === Compute nodes (values matched to `slurmd -C` output) ===
NodeName=insiiukcpu01 \
  NodeAddr=10.174.16.55 \
  CPUs=128 \
  Boards=1 \
  SocketsPerBoard=1 \
  CoresPerSocket=64 \
  ThreadsPerCore=2 \
  RealMemory=512000 \
  TmpDisk=7000000 \
  State=UNKNOWN

NodeName=insiiukcgpu01 \
  NodeAddr=10.174.16.56 \
  CPUs=64 \
  Boards=1 \
  SocketsPerBoard=1 \
  CoresPerSocket=32 \
  ThreadsPerCore=2 \
  RealMemory=256000 \
  TmpDisk=7000000 \
  Gres=gpu:l4:1 \
  State=UNKNOWN

NodeName=insiiukgpu01 \
  NodeAddr=10.174.16.57 \
  CPUs=64 \
  Boards=1 \
  SocketsPerBoard=1 \
  CoresPerSocket=32 \
  ThreadsPerCore=2 \
  RealMemory=256000 \
  TmpDisk=7000000 \
  Gres=gpu:h200_nvl:1 \
  State=UNKNOWN

NodeName=insiiukgpu02 \
  NodeAddr=10.174.16.58 \
  CPUs=64 \
  Boards=1 \
  SocketsPerBoard=1 \
  CoresPerSocket=32 \
  ThreadsPerCore=2 \
  RealMemory=256000 \
  TmpDisk=7000000 \
  Gres=gpu:h200_nvl:1 \
  State=UNKNOWN

# === Partitions — one per node so users target explicitly ===

# Default CPU partition — high-RAM, CPU-bound, mammalian assembly, large GWAS
PartitionName=cpu \
  Nodes=insiiukcpu01 \
  Default=YES \
  MaxTime=5-00:00:00 \
  DefaultTime=08:00:00 \
  MaxNodes=1 \
  DefMemPerCPU=4096 \
  State=UP \
  AllowGroups=ALL \
  AllowQos=debug,normal \
  Qos=normal \
  OverSubscribe=NO

# H200 NVL — gpu01 — heavy GPU compute, large ML training, big FEP+ campaigns
# PriorityTier=5 so a GPU job jumps the queue ahead of a cpu-overflow job
# competing for the same node's cores.
PartitionName=gpu01 \
  Nodes=insiiukgpu01 \
  Default=NO \
  MaxTime=5-00:00:00 \
  DefaultTime=04:00:00 \
  MaxNodes=1 \
  DefMemPerCPU=4096 \
  PriorityTier=5 \
  State=UP \
  AllowGroups=ALL \
  AllowQos=debug,normal \
  Qos=normal \
  OverSubscribe=NO

# H200 NVL — gpu02 — DEDICATED to compchem (heavy GPU / FEP+ / large ML).
# AllowAccounts gates submissions at the Slurm account level; pair with
# cpu-overflow excluding this node so non-compchem can't spillover here.
PartitionName=gpu02 \
  Nodes=insiiukgpu02 \
  Default=NO \
  MaxTime=5-00:00:00 \
  DefaultTime=04:00:00 \
  MaxNodes=1 \
  DefMemPerCPU=4096 \
  PriorityTier=5 \
  State=UP \
  AllowGroups=ALL \
  AllowAccounts=compchem \
  AllowQos=debug,normal \
  Qos=normal \
  OverSubscribe=NO

# L4 hybrid (CPU+GPU) — cgpu01 — DEDICATED to compchem (light GPU / inference).
# AllowAccounts gates submissions at the Slurm account level; pair with
# cpu-overflow and interactive excluding this node so non-compchem can't
# spillover or interactive-land here.
PartitionName=cgpu01 \
  Nodes=insiiukcgpu01 \
  Default=NO \
  MaxTime=2-00:00:00 \
  DefaultTime=02:00:00 \
  MaxNodes=1 \
  DefMemPerCPU=4096 \
  PriorityTier=5 \
  State=UP \
  AllowGroups=ALL \
  AllowAccounts=compchem \
  AllowQos=debug,normal \
  Qos=normal \
  OverSubscribe=NO

# Interactive — short walltime, high priority. cpu01-only since cgpu01 is
# now compchem-dedicated; non-compchem users won't accidentally land there.
PartitionName=interactive \
  Nodes=insiiukcpu01 \
  Default=NO \
  MaxTime=08:00:00 \
  DefaultTime=02:00:00 \
  MaxNodes=1 \
  DefMemPerCPU=4096 \
  PriorityTier=10 \
  State=UP \
  AllowGroups=ALL \
  AllowQos=debug,normal \
  Qos=normal \
  OverSubscribe=NO

# cpu-overflow — spans ALL 4 nodes so CPU-only jobs can use the
# 64 cores stranded on each GPU node. PriorityTier=1 (lower than
# GPU partitions) so a GPU job always wins the race for its node.
# MaxCPUsPerNode=48 reserves 16 cores/node for GPU jobs that need
# host-side cores alongside the accelerator. MaxTime=1d caps the
# blast radius when a long-running overflow job is blocking.
PartitionName=cpu-overflow \
  Nodes=insiiukcpu01,insiiukgpu01 \
  Default=NO \
  MaxTime=1-00:00:00 \
  DefaultTime=04:00:00 \
  MaxNodes=1 \
  DefMemPerCPU=4096 \
  MaxCPUsPerNode=48 \
  PriorityTier=1 \
  State=UP \
  AllowGroups=ALL \
  AllowQos=debug,normal \
  Qos=normal \
  OverSubscribe=NO
