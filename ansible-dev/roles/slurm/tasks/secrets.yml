---
# slurm secrets — vault-managed sensitive files.
#
# Files live in roles/slurm/files/ encrypted with ansible-vault (suffix
# .vault for clarity). Ansible's copy module auto-decrypts when reading
# vault'd sources, using the password file in ansible.cfg
# (`vault_password_file = ~/.ansible-vault-pass`).
#
# Tag: secrets. Default playbook runs include these; they're tagged for
# isolation if needed (e.g., `--tags secrets` to rotate keys only).

# ── munge key — cluster-wide auth secret ────────────────────
# Identical bytes on every node. mode 0400 + owner munge:munge required
# for munge daemon to accept it (and refuses if perms drift).
- name: munge key deployed (vault decrypt → /etc/munge/munge.key)
  ansible.builtin.copy:
    src: munge.key.vault
    dest: /etc/munge/munge.key
    owner: munge
    group: munge
    mode: "0400"
  notify: restart munge

# ── slurmdbd config — controller only ───────────────────────
- name: slurmdbd.conf deployed (vault decrypt → cpu01 only)
  ansible.builtin.copy:
    src: slurmdbd.conf.vault
    dest: /etc/slurm/slurmdbd.conf
    owner: slurm
    group: slurm
    mode: "0600"
  when: inventory_hostname == slurm_controller_host
  notify: restart slurmdbd
