# Research cluster inventory — 4 nodes.
# ansible_host=<IP> makes Ansible connect by IP directly, independent of
# /etc/hosts on the controller. Inventory names (insiiuk*) stay as the
# readable identifier in playbooks/logs.

[controllers]
insiiukcpu01   ansible_host=10.174.16.55

[compute]
insiiukgpu01   ansible_host=10.174.16.57
insiiukgpu02   ansible_host=10.174.16.58
insiiukcgpu01  ansible_host=10.174.16.56

[gpu_nodes]
insiiukgpu01
insiiukgpu02
insiiukcgpu01

[h200_nodes]
insiiukgpu01
insiiukgpu02

[l4_nodes]
insiiukcgpu01

[chem_dedicated]
insiiukcgpu01

[all_cluster:children]
controllers
compute
